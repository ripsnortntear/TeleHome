name: TeleHome
version: 1.1.0
main: com.blackboxai.telehome.TeleHome
api-version: '1.21'
author: BlackBoxAI
description: Set, list, delete, and teleport to personal homes.

commands:
  sethome:
    description: Set a home at your current location.
    usage: /sethome <name>
    permission: telehome.sethome
  home:
    description: Teleport to one of your homes.
    usage: /home <name>
    permission: telehome.home
  delhome:
    description: Delete one of your homes.
    usage: /delhome <name>
    permission: telehome.delhome
    aliases: [removehome, rmhome]
  listhome:
    description: List all of your homes.
    usage: /listhome
    permission: telehome.listhome
    aliases: [homes, listhomes]

permissions:
  telehome.sethome:
    description: Allows setting homes.
    default: true
  telehome.home:
    description: Allows teleporting to homes.
    default: true
  telehome.delhome:
    description: Allows deleting homes.
    default: true
  telehome.listhome:
    description: Allows listing homes.
    default: true